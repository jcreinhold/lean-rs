name: Release

# Tag-triggered release. Pushing a `v<semver>` tag (e.g. `v0.1.0`, `v0.1.0-rc.1`)
# runs the full pre-flight gate set, the public-API diff, the workspace publish
# dry-run, then the four-crate live publish in dependency order, and finally
# creates a GitHub Release whose body is the matching `## [<version>]` section
# of `CHANGELOG.md`.
#
# Manual re-runs use `workflow_dispatch` with `dry_run: true` to exercise the
# gates without uploading or creating a release.
#
# `CARGO_REGISTRY_TOKEN` must be set in the repository secrets before the first
# tag push (see `docs/release.md`). The token is a scoped publish token from
# <https://crates.io/settings/tokens>. The publish steps fail with a clear
# "no token configured" message if the secret is absent.
#
# Per-toolchain compatibility is the job of `ci.yml`; this workflow runs once
# against the head of the supported window (set by `LEAN_VERSION` below).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run all gates but skip the live publish and GitHub Release.'
        type: boolean
        default: false

concurrency:
  # One release at a time per tag. `cancel-in-progress: false` matters here:
  # a half-finished publish that gets cancelled mid-run wastes a published
  # crate version (crates.io versions are immutable, so the next attempt
  # would have to bump the patch number).
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # softprops/action-gh-release needs this to create the release.

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Lean toolchain to publish against — the head of the supported window
  # (mirror of the last entry in `lean_rs_sys::SUPPORTED_TOOLCHAINS`).
  # Bumping the window: update this AND ci.yml's matrix AND
  # `crates/lean-rs-sys/src/supported.rs` in the same PR. See
  # `docs/bump-toolchain.md`.
  LEAN_VERSION: '4.29.1'

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan + Lean ${{ env.LEAN_VERSION }}
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain leanprover/lean4:v${{ env.LEAN_VERSION }}
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Pin workspace to Lean ${{ env.LEAN_VERSION }}
        run: |
          printf 'leanprover/lean4:v%s\n' "${{ env.LEAN_VERSION }}" > lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ env.LEAN_VERSION }}" > lake/lean-rs-host-shims/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ env.LEAN_VERSION }}" > fixtures/lean/lean-toolchain

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ env.LEAN_VERSION }}

      - name: Install cargo-nextest + cargo-public-api
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-public-api

      - name: Build Lake packages
        run: |
          (cd lake/lean-rs-host-shims && lake build)
          (cd fixtures/lean && lake build)

      - name: Verify tag matches workspace version
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; m=json.load(sys.stdin); print(next(p["version"] for p in m["packages"] if p["name"]=="lean-rs"))')
          expected="v${version}"
          if [ "$tag" != "$expected" ]; then
            echo "::error::Tag $tag does not match workspace version (expected $expected). Bump Cargo.toml or re-tag."
            exit 1
          fi
          echo "Tag $tag matches workspace version $version"

      - name: Pre-flight — cargo fmt
        run: cargo fmt --check

      - name: Pre-flight — cargo clippy
        env:
          LEAN_SYSROOT: ${{ env.HOME }}/.elan/toolchains/leanprover--lean4---v${{ env.LEAN_VERSION }}
        run: cargo clippy --all-targets -- -D warnings

      - name: Pre-flight — cargo nextest
        env:
          LEAN_SYSROOT: ${{ env.HOME }}/.elan/toolchains/leanprover--lean4---v${{ env.LEAN_VERSION }}
        run: cargo nextest run --workspace --profile ci

      - name: Pre-flight — cargo test --doc
        env:
          LEAN_SYSROOT: ${{ env.HOME }}/.elan/toolchains/leanprover--lean4---v${{ env.LEAN_VERSION }}
        run: cargo test --doc --workspace

      - name: Pre-flight — cargo doc
        env:
          LEAN_SYSROOT: ${{ env.HOME }}/.elan/toolchains/leanprover--lean4---v${{ env.LEAN_VERSION }}
          RUSTDOCFLAGS: '-D warnings'
        run: cargo doc --no-deps --workspace

      - name: Public-API diff vs committed baselines
        env:
          LEAN_SYSROOT: ${{ env.HOME }}/.elan/toolchains/leanprover--lean4---v${{ env.LEAN_VERSION }}
        run: |
          set -euo pipefail
          fail=0
          for crate in lean-rs-sys lean-toolchain lean-rs lean-rs-host; do
            baseline="docs/api-review/${crate}-public.txt"
            if [ ! -f "$baseline" ]; then
              echo "::error::Missing baseline: $baseline"
              fail=1
              continue
            fi
            actual=$(mktemp)
            cargo public-api --simplified -p "$crate" > "$actual"
            if ! diff -u "$baseline" "$actual"; then
              echo "::error::Public-API drift for $crate. Regenerate $baseline in the same commit that bumps the version."
              fail=1
            fi
          done
          exit "$fail"

      - name: Workspace publish dry-run
        env:
          LEAN_SYSROOT: ${{ env.HOME }}/.elan/toolchains/leanprover--lean4---v${{ env.LEAN_VERSION }}
        run: cargo publish --workspace --dry-run

      - name: Publish lean-rs-sys
        if: inputs.dry_run != true
        env:
          LEAN_SYSROOT: ${{ env.HOME }}/.elan/toolchains/leanprover--lean4---v${{ env.LEAN_VERSION }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p lean-rs-sys

      - name: Wait for crates.io index (lean-rs-sys)
        if: inputs.dry_run != true
        run: sleep 90

      - name: Publish lean-toolchain
        if: inputs.dry_run != true
        env:
          LEAN_SYSROOT: ${{ env.HOME }}/.elan/toolchains/leanprover--lean4---v${{ env.LEAN_VERSION }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p lean-toolchain

      - name: Wait for crates.io index (lean-toolchain)
        if: inputs.dry_run != true
        run: sleep 90

      - name: Publish lean-rs
        if: inputs.dry_run != true
        env:
          LEAN_SYSROOT: ${{ env.HOME }}/.elan/toolchains/leanprover--lean4---v${{ env.LEAN_VERSION }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p lean-rs

      - name: Wait for crates.io index (lean-rs)
        if: inputs.dry_run != true
        run: sleep 90

      - name: Publish lean-rs-host
        if: inputs.dry_run != true
        env:
          LEAN_SYSROOT: ${{ env.HOME }}/.elan/toolchains/leanprover--lean4---v${{ env.LEAN_VERSION }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p lean-rs-host

      - name: Extract CHANGELOG section for this release
        if: inputs.dry_run != true && github.event_name == 'push'
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "::error::No CHANGELOG section for [$version]; add one before tagging."
            exit 1
          fi
          echo "--- Release body ---"
          cat release-body.md
          echo "--- End release body ---"

      - name: Create GitHub Release
        if: inputs.dry_run != true && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
