name: Release

# Tag-triggered release. Pushing a `v<semver>` tag (e.g. `v0.1.1`, `v0.1.1-rc.1`)
# runs the full compatibility matrix (`verify` job), then the per-crate live
# publish in dependency order (`publish` job, depends on `verify`), then creates
# a GitHub Release whose body is the matching `## [<version>]` section of
# `CHANGELOG.md`.
#
# Manual re-runs use `workflow_dispatch` with `dry_run: true` to exercise the
# gates without uploading or creating a release.
#
# `CARGO_REGISTRY_TOKEN` must be set in the repository secrets before the first
# tag push (see `docs/release.md`). The token is a scoped publish token from
# <https://crates.io/settings/tokens>. The publish step fails with a clear
# "no token configured" message if the secret is absent.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run all gates but skip the live publish and GitHub Release."
        type: boolean
        default: false

concurrency:
  # One release at a time per tag. `cancel-in-progress: false`: a
  # half-finished publish that gets cancelled mid-run wastes a published
  # crate version (crates.io versions are immutable).
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # softprops/action-gh-release needs this for the release.

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Head of the supported Lean window. The publish job runs once
  # against this version (the matrix in `verify` covers the rest).
  # Bumping the window: update this AND the matrix in `verify` AND
  # `crates/lean-rs-sys/src/supported.rs`. See `docs/bump-toolchain.md`.
  LEAN_VERSION_HEAD: "4.31.0-rc1"

jobs:
  verify:
    name: Verify ${{ matrix.os }} / Lean ${{ matrix.lean_version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Release-gate matrix: head Lean × both supported OSes (2 cells).
        # The full SUPPORTED_TOOLCHAINS sweep runs on demand via
        # `ci.yml`'s `workflow_dispatch` with `full_matrix: true`.
        # Rationale: runner cost; trailing-edge breakages tend to
        # surface in the docs/release.md known-issues list rather
        # than as silent regressions, and the version-window
        # SUPPORTED_TOOLCHAINS table is the source of truth.
        os: [ubuntu-latest, macos-latest]
        lean_version: ["4.31.0-rc1"]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-verify-${{ matrix.lean_version }}-${{ matrix.os }}

      - name: Install cargo-nextest + cargo-public-api
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-public-api

      - name: Install actionlint
        if: matrix.os == 'ubuntu-latest'
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install elan + Lean ${{ matrix.lean_version }}
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain leanprover/lean4:v${{ matrix.lean_version }}
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Export LEAN_SYSROOT (shell-expanded)
        run: |
          echo "LEAN_SYSROOT=$HOME/.elan/toolchains/leanprover--lean4---v${{ matrix.lean_version }}" >> "$GITHUB_ENV"

      - name: Pin workspace to Lean ${{ matrix.lean_version }}
        run: |
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > crates/lean-rs/shims/lean-rs-interop-shims/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > crates/lean-rs-host/shims/lean-rs-interop-shims/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > crates/lean-rs-host/shims/lean-rs-host-shims/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > fixtures/lean/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > fixtures/interop-shims/lean-toolchain

      - name: Build Lake packages
        run: |
          (cd crates/lean-rs/shims/lean-rs-interop-shims && lake build)
          (cd crates/lean-rs-host/shims/lean-rs-interop-shims && lake build)
          (cd crates/lean-rs-host/shims/lean-rs-host-shims && lake build)
          (cd fixtures/lean && lake build)
          (cd fixtures/interop-shims && lake build)
          if [ "$RUNNER_OS" = "Linux" ]; then
            lean_lib_paths="$GITHUB_WORKSPACE/crates/lean-rs/shims/lean-rs-interop-shims/.lake/build/lib"
            lean_lib_paths="$lean_lib_paths:$GITHUB_WORKSPACE/crates/lean-rs-host/shims/lean-rs-interop-shims/.lake/build/lib"
            lean_lib_paths="$lean_lib_paths:$GITHUB_WORKSPACE/crates/lean-rs-host/shims/lean-rs-host-shims/.lake/build/lib"
            lean_lib_paths="$lean_lib_paths:$GITHUB_WORKSPACE/fixtures/lean/.lake/build/lib"
            lean_lib_paths="$lean_lib_paths:$GITHUB_WORKSPACE/fixtures/interop-shims/.lake/build/lib"
            echo "LD_LIBRARY_PATH=$lean_lib_paths${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          fi

      - name: Install Rust nightly for ABI fuzz smoke
        if: matrix.os == 'ubuntu-latest'
        run: rustup toolchain install nightly --component rust-src

      - name: Install cargo-fuzz
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-fuzz --locked

      - name: ABI fuzz smoke
        if: matrix.os == 'ubuntu-latest'
        working-directory: crates/lean-rs/fuzz
        # `ASAN_OPTIONS=detect_leaks=0` disables LeakSanitizer, which
        # ASan turns on by default on Linux. Lean's shared runtime
        # intentionally retains process-global allocations at shutdown
        # (the same reason `docs/safety/unsafe-inventory.md` excludes
        # Lean from Linux ASan instrumentation); LSan flags those at
        # process exit and the binary terminates non-zero before any
        # actual fuzz finding can be reported. libFuzzer's own
        # `-detect_leaks=0` flag does not turn off this exit-time
        # check — it only disables libFuzzer's intra-run leak loop.
        # The goal of this gate is ABI-decode coverage in the Rust
        # harness, not auditing Lean's runtime cleanup. LSan does not
        # run on macOS, so local repros on darwin won't see the
        # difference.
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: cargo +nightly fuzz run abi_decode -- -runs=200000 -max_total_time=120

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

      - name: actionlint workflows
        if: matrix.os == 'ubuntu-latest'
        run: actionlint .github/workflows/ci.yml .github/workflows/release.yml .github/workflows/sanitizer.yml .github/workflows/compile-fail.yml

      # See `ci.yml` for the rationale on `RUST_BACKTRACE=0` and
      # `LD_PRELOAD=libgcc_s.so.1` here.
      - name: cargo nextest run
        env:
          RUST_BACKTRACE: "0"
          LD_PRELOAD: ${{ matrix.os == 'ubuntu-latest' && '/usr/lib/x86_64-linux-gnu/libgcc_s.so.1' || '' }}
        run: cargo nextest run --workspace --profile ci

      - name: cargo test --doc
        run: cargo test --doc --workspace

      - name: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --workspace

      # docs.rs builds only on Linux, so the docs.rs-mode build only
      # needs to run on the Ubuntu cell.
      - name: docs.rs compatibility doc build
        if: matrix.os == 'ubuntu-latest'
        env:
          DOCS_RS: "1"
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --workspace

      - name: Package tarball docs.rs simulation
        if: matrix.os == 'ubuntu-latest'
        run: python3 scripts/check_package_docsrs.py

  publish:
    name: Publish ${{ github.ref_name }}
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # `cargo public-api` invokes `cargo +nightly rustdoc` internally
      # to emit the structured JSON form of the public surface.
      # Without nightly installed it bails before reaching the
      # `-p <crate>` filter and confusingly reports "Cargo.toml is a
      # virtual manifest". Install nightly explicitly here.
      - name: Install Rust nightly (for cargo-public-api)
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-publish-${{ env.LEAN_VERSION_HEAD }}

      - name: Install cargo-public-api
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-public-api

      - name: Install elan + Lean ${{ env.LEAN_VERSION_HEAD }}
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain leanprover/lean4:v${{ env.LEAN_VERSION_HEAD }}
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Export LEAN_SYSROOT (shell-expanded)
        run: |
          echo "LEAN_SYSROOT=$HOME/.elan/toolchains/leanprover--lean4---v${{ env.LEAN_VERSION_HEAD }}" >> "$GITHUB_ENV"

      - name: Pin workspace to Lean ${{ env.LEAN_VERSION_HEAD }}
        run: |
          printf 'leanprover/lean4:v%s\n' "${{ env.LEAN_VERSION_HEAD }}" > lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ env.LEAN_VERSION_HEAD }}" > crates/lean-rs/shims/lean-rs-interop-shims/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ env.LEAN_VERSION_HEAD }}" > crates/lean-rs-host/shims/lean-rs-interop-shims/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ env.LEAN_VERSION_HEAD }}" > crates/lean-rs-host/shims/lean-rs-host-shims/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ env.LEAN_VERSION_HEAD }}" > fixtures/lean/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ env.LEAN_VERSION_HEAD }}" > fixtures/interop-shims/lean-toolchain

      - name: Build Lake packages
        run: |
          (cd crates/lean-rs/shims/lean-rs-interop-shims && lake build)
          (cd crates/lean-rs-host/shims/lean-rs-interop-shims && lake build)
          (cd crates/lean-rs-host/shims/lean-rs-host-shims && lake build)
          (cd fixtures/lean && lake build)
          (cd fixtures/interop-shims && lake build)
          if [ "$RUNNER_OS" = "Linux" ]; then
            lean_lib_paths="$GITHUB_WORKSPACE/crates/lean-rs/shims/lean-rs-interop-shims/.lake/build/lib"
            lean_lib_paths="$lean_lib_paths:$GITHUB_WORKSPACE/crates/lean-rs-host/shims/lean-rs-interop-shims/.lake/build/lib"
            lean_lib_paths="$lean_lib_paths:$GITHUB_WORKSPACE/crates/lean-rs-host/shims/lean-rs-host-shims/.lake/build/lib"
            lean_lib_paths="$lean_lib_paths:$GITHUB_WORKSPACE/fixtures/lean/.lake/build/lib"
            lean_lib_paths="$lean_lib_paths:$GITHUB_WORKSPACE/fixtures/interop-shims/.lake/build/lib"
            echo "LD_LIBRARY_PATH=$lean_lib_paths${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          fi

      - name: Verify tag matches workspace version
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; m=json.load(sys.stdin); print(next(p["version"] for p in m["packages"] if p["name"]=="lean-rs"))')
          expected="v${version}"
          if [ "$tag" != "$expected" ]; then
            echo "::error::Tag $tag does not match workspace version (expected $expected). Bump Cargo.toml or re-tag."
            exit 1
          fi
          echo "Tag $tag matches workspace version $version"

      - name: Public-API diff vs committed baselines
        run: |
          set -euo pipefail
          fail=0
          for crate in lean-rs-sys lean-toolchain lean-rs lean-rs-host lean-rs-worker-protocol lean-rs-worker-parent lean-rs-worker-child; do
            baseline="docs/api-review/${crate}-public.txt"
            if [ ! -f "$baseline" ]; then
              echo "::error::Missing baseline: $baseline"
              fail=1
              continue
            fi
            actual=$(mktemp)
            cargo public-api --simplified -p "$crate" > "$actual"
            if ! diff -u "$baseline" "$actual"; then
              echo "::error::Public-API drift for $crate. Regenerate $baseline in the same commit that bumps the version."
              fail=1
            fi
          done
          exit "$fail"

      # `cargo publish --workspace` (stabilised in Rust 1.90) computes the
      # workspace dependency DAG, packages every crate, runs `cargo publish`'s
      # verify build against a local registry overlay so downstream crates can
      # see pending upstream publishes before the crates.io index has updated,
      # then uploads in topological order (and in parallel where the DAG
      # allows). For dry runs, `--dry-run` exercises the same verify path
      # without uploading or contacting crates.io for credentials.
      - name: Publish workspace
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --workspace --dry-run
          else
            cargo publish --workspace
          fi

      - name: Extract CHANGELOG section for this release
        if: inputs.dry_run != true && github.event_name == 'push'
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "::error::No CHANGELOG section for [$version]; add one before tagging."
            exit 1
          fi
          echo "--- Release body ---"
          cat release-body.md
          echo "--- End release body ---"

      - name: Create GitHub Release
        if: inputs.dry_run != true && github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-body.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
