name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

      # Tests run under nextest (one process per test) because the
      # default single-process `cargo test` accumulates Lean runtime
      # state across tests and exhausts memory. See docs/testing.md.
      - name: cargo nextest run
        run: cargo nextest run --workspace --profile ci

      # Doctests are not picked up by nextest; run separately.
      - name: cargo test --doc
        run: cargo test --doc --workspace

      - name: cargo doc --no-deps
        run: cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: -D warnings
