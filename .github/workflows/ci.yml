name: CI

# Per-push CI: a single ubuntu cell pinned to the head of the supported
# Lean window (mirror of the last entry in `lean_rs_sys::SUPPORTED_TOOLCHAINS`).
#
# The full {6 Lean toolchain} × {ubuntu, macos} compatibility matrix runs
# in `release.yml`'s `verify` job on tag push, and on demand via this
# workflow's `workflow_dispatch` matrix input. Per-push burn is kept low
# by design.
#
# Doc-only commits skip CI via the `paths-ignore` filter — none of the
# Rust gates can break when only Markdown / api-review baselines change.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'prompts/**'
      - 'CHANGELOG.md'
      - 'CLAUDE.md'
      - '.gitignore'
      - 'LICENSE-*'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'prompts/**'
      - 'CHANGELOG.md'
      - 'CLAUDE.md'
      - '.gitignore'
      - 'LICENSE-*'
  workflow_dispatch:
    inputs:
      full_matrix:
        description: 'Run the full {6 Lean toolchain} × {ubuntu, macos} matrix instead of the single head cell.'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Default: 1 (full backtrace on real failures). The nextest step
  # overrides to 0 because RUST_BACKTRACE=1 triggers libstd to walk the
  # stack on every panic, and Lean's `libleanshared.so` frames break
  # the glibc unwinder on Linux (the panic tests in `error::tests::*`
  # SEGV during backtrace capture, not during the panic itself).
  RUST_BACKTRACE: 1

jobs:
  check:
    name: ${{ matrix.os }} / Lean ${{ matrix.lean_version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Default per-push: a single ubuntu cell on head Lean. The full
        # matrix only runs when `workflow_dispatch` is triggered with
        # `full_matrix: true`. Bumping the supported window:
        #
        #   1. Update `crates/lean-rs-sys/src/supported.rs`.
        #   2. Update the `lean_version` default below to the new head.
        #   3. Update the `include`/`full_matrix` lists below.
        #
        # See `docs/bump-toolchain.md`.
        os: [ubuntu-latest]
        lean_version: ['4.30.0-rc2']
        include: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.full_matrix) && '[{"os":"ubuntu-latest","lean_version":"4.26.0"},{"os":"ubuntu-latest","lean_version":"4.27.0"},{"os":"ubuntu-latest","lean_version":"4.28.0"},{"os":"ubuntu-latest","lean_version":"4.28.1"},{"os":"ubuntu-latest","lean_version":"4.29.0"},{"os":"ubuntu-latest","lean_version":"4.29.1"},{"os":"macos-latest","lean_version":"4.26.0"},{"os":"macos-latest","lean_version":"4.27.0"},{"os":"macos-latest","lean_version":"4.28.0"},{"os":"macos-latest","lean_version":"4.28.1"},{"os":"macos-latest","lean_version":"4.29.0"},{"os":"macos-latest","lean_version":"4.29.1"},{"os":"macos-latest","lean_version":"4.30.0-rc2"}]' || '[]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: lean-${{ matrix.lean_version }}-${{ matrix.os }}

      - name: Install cargo-nextest + cargo-public-api
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-public-api

      - name: Install actionlint
        if: matrix.os == 'ubuntu-latest' && matrix.lean_version == '4.30.0-rc2'
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install elan + Lean ${{ matrix.lean_version }}
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain leanprover/lean4:v${{ matrix.lean_version }}
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # `LEAN_SYSROOT` is consumed by `lean-rs-sys/build.rs`. Export via
      # `$GITHUB_ENV` so `$HOME` is shell-expanded — a YAML `env:` block
      # using `${{ env.HOME }}` evaluates to an empty string.
      - name: Export LEAN_SYSROOT (shell-expanded)
        run: |
          echo "LEAN_SYSROOT=$HOME/.elan/toolchains/leanprover--lean4---v${{ matrix.lean_version }}" >> "$GITHUB_ENV"

      - name: Pin workspace to Lean ${{ matrix.lean_version }}
        run: |
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > crates/lean-rs/shims/lean-rs-interop-shims/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > crates/lean-rs-host/shims/lean-rs-interop-shims/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > crates/lean-rs-host/shims/lean-rs-host-shims/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > fixtures/lean/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > fixtures/interop-shims/lean-toolchain

      - name: Build Lake packages
        run: |
          (cd crates/lean-rs/shims/lean-rs-interop-shims && lake build)
          (cd crates/lean-rs-host/shims/lean-rs-interop-shims && lake build)
          (cd crates/lean-rs-host/shims/lean-rs-host-shims && lake build)
          (cd fixtures/lean && lake build)
          (cd fixtures/interop-shims && lake build)
          if [ "$RUNNER_OS" = "Linux" ]; then
            lean_lib_paths="$GITHUB_WORKSPACE/crates/lean-rs/shims/lean-rs-interop-shims/.lake/build/lib"
            lean_lib_paths="$lean_lib_paths:$GITHUB_WORKSPACE/crates/lean-rs-host/shims/lean-rs-interop-shims/.lake/build/lib"
            lean_lib_paths="$lean_lib_paths:$GITHUB_WORKSPACE/crates/lean-rs-host/shims/lean-rs-host-shims/.lake/build/lib"
            lean_lib_paths="$lean_lib_paths:$GITHUB_WORKSPACE/fixtures/lean/.lake/build/lib"
            lean_lib_paths="$lean_lib_paths:$GITHUB_WORKSPACE/fixtures/interop-shims/.lake/build/lib"
            echo "LD_LIBRARY_PATH=$lean_lib_paths${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          fi

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

      - name: actionlint workflows
        if: matrix.os == 'ubuntu-latest' && matrix.lean_version == '4.30.0-rc2'
        run: actionlint .github/workflows/ci.yml .github/workflows/release.yml .github/workflows/sanitizer.yml

      # Two Linux-specific overrides for the panic-handling tests in
      # `error::tests` and `runtime::*::tests`:
      #
      # 1. `RUST_BACKTRACE=0` — the default panic hook's backtrace
      #    capture walks the stack through `libleanshared.so` frames
      #    whose DWARF the glibc unwinder mis-decodes.
      #
      # 2. `LD_PRELOAD=libgcc_s.so.1` — `libleanshared.so` is a C++
      #    binary that statically links its own libstdc++ + `_Unwind_*`
      #    symbols. When dynamically loaded into the test binary,
      #    those symbols shadow glibc's libgcc_s unwinder; Rust panic
      #    unwinding then can't find catch_unwind's landing pads and
      #    aborts. Preloading the system libgcc_s forces it to win
      #    symbol resolution. macOS doesn't reproduce because Mach-O
      #    two-level namespaces scope symbol lookup per-image.
      - name: cargo nextest run
        env:
          RUST_BACKTRACE: '0'
          LD_PRELOAD: ${{ matrix.os == 'ubuntu-latest' && '/usr/lib/x86_64-linux-gnu/libgcc_s.so.1' || '' }}
        run: cargo nextest run --workspace --profile ci

      - name: cargo test --doc
        run: cargo test --doc --workspace

      - name: loader regression suite
        run: cargo test -p lean-rs-worker --test loader_regressions -- --nocapture --test-threads=1

      - name: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --workspace

      - name: docs.rs compatibility doc build
        env:
          DOCS_RS: '1'
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --workspace

      - name: Package tarball docs.rs simulation
        run: python3 scripts/check_package_docsrs.py

      - name: Install Rust nightly (for cargo-public-api)
        if: matrix.os == 'ubuntu-latest' && matrix.lean_version == '4.30.0-rc2'
        run: rustup toolchain install nightly --profile minimal

      - name: Public-API diff vs committed baselines
        if: matrix.os == 'ubuntu-latest' && matrix.lean_version == '4.30.0-rc2'
        run: |
          set -euo pipefail
          fail=0
          for crate in lean-rs-sys lean-toolchain lean-rs lean-rs-host lean-rs-worker; do
            baseline="docs/api-review/${crate}-public.txt"
            if [ ! -f "$baseline" ]; then
              echo "::error::Missing baseline: $baseline"
              fail=1
              continue
            fi
            actual=$(mktemp)
            cargo public-api --simplified -p "$crate" > "$actual"
            if ! diff -u "$baseline" "$actual"; then
              echo "::error::Public-API drift for $crate. Regenerate $baseline in the same commit that changes public API."
              fail=1
            fi
          done
          exit "$fail"
