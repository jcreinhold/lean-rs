name: Compile-fail

# Runs the trybuild `.stderr` snapshot suites on a single OS + the repo's
# pinned stable toolchain (`rust-toolchain.toml`). These snapshots capture
# `rustc` diagnostics whose wording/whitespace drifts across platforms and
# toolchain versions, so they are gated behind `RUN_TRYBUILD=1` and run only
# here—the per-PR `ci.yml` matrix does not. A stable-toolchain bump that
# changes a diagnostic requires regenerating the snapshots with
# `TRYBUILD=overwrite RUN_TRYBUILD=1 cargo test --test compile_fail_surface`.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "24 8 * * 1"
  workflow_dispatch:

concurrency:
  group: compile-fail-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  LEAN_VERSION_HEAD: "4.31.0-rc1"

jobs:
  compile-fail:
    name: Compile-fail snapshots (pinned stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # rust-toolchain.toml pins `channel = "stable"`; cargo resolves it for
      # every command, so the snapshots match local regeneration on the same
      # pinned stable. `rust-src` is required: some `.stderr` snapshots quote
      # the standard-library source (e.g. `PhantomData` in `core/src/marker.rs`)
      # in "required because it appears within the type" notes, and rustc only
      # renders that snippet when the std source is on disk. Regenerate
      # snapshots with `rust-src` installed so they match this job.
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          key: compile-fail-${{ env.LEAN_VERSION_HEAD }}

      - name: Install elan + Lean ${{ env.LEAN_VERSION_HEAD }}
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain leanprover/lean4:v${{ env.LEAN_VERSION_HEAD }}
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Export LEAN_SYSROOT
        # `lean-rs-sys/build.rs` reads `lean.h` from the sysroot to compute the
        # header digest. The negative cases fail to compile before any link
        # step, so no `libleanshared` runtime is needed.
        run: |
          echo "LEAN_SYSROOT=$HOME/.elan/toolchains/leanprover--lean4---v${{ env.LEAN_VERSION_HEAD }}" >> "$GITHUB_ENV"

      - name: Build Lean fixture
        # The `lean-rs` / `lean-rs-host` snapshot suites pull in
        # `lean-toolchain`, whose build script digests the workspace Lake
        # fixture and aborts when its compiled artifacts are absent. The
        # trybuild snapshots never run Lean, but the host crates must still
        # build, so the fixture olean + dylib have to exist.
        run: (cd fixtures/lean && lake build)

      - name: Run compile-fail snapshot suites
        env:
          RUN_TRYBUILD: "1"
        run: |
          cargo test -p lean-rs-sys -p lean-rs -p lean-rs-host \
            --test compile_fail_surface
