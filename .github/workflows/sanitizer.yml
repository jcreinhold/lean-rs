name: Sanitizer

# Runs the platform-supported sanitizer (AddressSanitizer on Linux,
# which includes LeakSanitizer by default) against the `lean-rs` test
# binaries, plus a short cargo-fuzz session against the `abi_decode`
# target. The job needs nightly Rust (sanitizer flags + cargo-fuzz)
# and the Lean toolchain (for the fixture dylib the integration tests
# load). It is the verification step that the SAFETY-HARDENING contract
# in `prompts/lean-rs/00-current-state.md` cites.
#
# This workflow is kept separate from `ci.yml` because the stable
# matrix there pins `rust-toolchain.toml`'s `stable`; sanitizers need
# nightly, and mixing them into one job would obscure which step
# regressed when something breaks.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly Monday 07:00 UTC — catches drift even on quiet weeks.
    - cron: "0 7 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Crank the per-test loops so the sanitizer has enough surface to
  # surface any leak / use-after-free. The defaults the tests use on
  # stable `cargo test` keep the suite fast; this override is the
  # sanitizer-only bump.
  LEAN_RS_REFCOUNT_STRESS_ITERS: "20000"
  LEAN_RS_LEAK_LOOP_ITERS: "256"

jobs:
  asan:
    name: AddressSanitizer (ubuntu-latest, nightly, Lean ${{ matrix.lean_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Sanitizer covers the endpoints of the supported window plus
        # the current head; the full matrix is in ci.yml. Bumping the
        # window: update these entries to the new endpoints.
        lean_version: ["4.26.0", "4.29.1"]
    steps:
      - uses: actions/checkout@v4

      - name: Install elan + Lean ${{ matrix.lean_version }}
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain leanprover/lean4:v${{ matrix.lean_version }}
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # `lean-rs-sys/build.rs` reads `LEAN_SYSROOT` to bake an rpath into
      # compiled artifacts. Exporting through `$GITHUB_ENV` so `$HOME`
      # gets expanded by the shell — a YAML `env:` block with
      # `${{ env.HOME }}` evaluates to an empty string.
      - name: Export LEAN_SYSROOT (shell-expanded)
        run: |
          echo "LEAN_SYSROOT=$HOME/.elan/toolchains/leanprover--lean4---v${{ matrix.lean_version }}" >> "$GITHUB_ENV"

      - name: Pin workspace to Lean ${{ matrix.lean_version }}
        run: |
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > lake/lean-rs-host-shims/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > fixtures/lean/lean-toolchain

      - name: Install Rust nightly + rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Build Lean fixtures
        working-directory: fixtures/lean
        run: lake build

      # Scoped to `lean-rs-sys` only. The L1/L2 safe layers initialize the
      # Lean runtime, which drags in `libleanshared`'s statically-linked
      # mimalloc; mimalloc's `munmap` patterns collide with AddressSanitizer's
      # shadow-memory tracking (`CHECK failed: sanitizer_common.cpp "unable
      # to unmmap"`) and the process aborts before any test result is
      # reported. The `lean-rs-sys` tests (`linkage.rs`, `layout.rs`,
      # `safety_grep.rs`) take symbol addresses and inspect repr layouts
      # without ever calling `lean_initialize`, so mimalloc stays dormant
      # and ASan sees a clean process. The fuzz job below covers the ABI
      # decode surface; the regular `ci.yml` matrix covers the safe-layer
      # correctness on every supported Lean toolchain. Upstream tracking:
      # mimalloc + ASan compatibility is a known limitation in the Lean
      # 4.x runtime; revisit when Lean ships a build that supports
      # `LEAN_USE_MIMALLOC=OFF` through elan.
      - name: cargo +nightly test with AddressSanitizer (lean-rs-sys scope)
        env:
          RUSTFLAGS: "-Z sanitizer=address -Cdebug-assertions=on"
          RUSTDOCFLAGS: "-Z sanitizer=address"
          ASAN_OPTIONS: "detect_leaks=1:abort_on_error=1"
        run: |
          cargo +nightly test \
            -p lean-rs-sys \
            --target x86_64-unknown-linux-gnu \
            --tests \
            -- --include-ignored --test-threads=1

  fuzz:
    name: cargo-fuzz abi_decode (ubuntu-latest, nightly, Lean ${{ matrix.lean_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Fuzz against current head; the asan job above sweeps both
        # endpoints. Bumping the window: update to the new head.
        lean_version: ["4.29.1"]
    steps:
      - uses: actions/checkout@v4

      - name: Install elan + Lean ${{ matrix.lean_version }}
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain leanprover/lean4:v${{ matrix.lean_version }}
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # `LEAN_SYSROOT` for the build; `LD_LIBRARY_PATH` so the cargo-fuzz
      # binary can dlopen `libleanshared.so` at runtime — cargo-fuzz
      # emits its harness binary into `target/.../release/` without
      # inheriting `lean-rs-sys`'s `cargo:rustc-link-arg=-Wl,-rpath` (the
      # directive only applies to the package emitting it). Exporting via
      # `$GITHUB_ENV` so `$HOME` is shell-expanded (a YAML `env:` block
      # using `${{ env.HOME }}` would resolve to an empty string).
      - name: Export LEAN_SYSROOT + LD_LIBRARY_PATH (shell-expanded)
        run: |
          lean_lib="$HOME/.elan/toolchains/leanprover--lean4---v${{ matrix.lean_version }}/lib/lean"
          echo "LEAN_SYSROOT=$HOME/.elan/toolchains/leanprover--lean4---v${{ matrix.lean_version }}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$lean_lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Pin workspace to Lean ${{ matrix.lean_version }}
        run: |
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > lake/lean-rs-host-shims/lean-toolchain
          printf 'leanprover/lean4:v%s\n' "${{ matrix.lean_version }}" > fixtures/lean/lean-toolchain

      - name: Install Rust nightly + rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: cargo +nightly fuzz run abi_decode (120s budget)
        working-directory: crates/lean-rs/fuzz
        run: cargo +nightly fuzz run abi_decode -- -runs=200000 -max_total_time=120
