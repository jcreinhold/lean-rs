name: Sanitizer

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "24 8 * * 1"
  workflow_dispatch:

concurrency:
  group: sanitizer-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  LEAN_VERSION_HEAD: "4.30.0-rc2"
  RUST_BACKTRACE: "0"

jobs:
  asan:
    name: Linux ASan (Rust-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          key: sanitizer-${{ env.LEAN_VERSION_HEAD }}

      - name: Install elan + Lean ${{ env.LEAN_VERSION_HEAD }}
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain leanprover/lean4:v${{ env.LEAN_VERSION_HEAD }}
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Export LEAN_SYSROOT
        run: |
          echo "LEAN_SYSROOT=$HOME/.elan/toolchains/leanprover--lean4---v${{ env.LEAN_VERSION_HEAD }}" >> "$GITHUB_ENV"

      - name: Build Lake packages
        run: |
          (cd crates/lean-rs/shims/lean-rs-interop-shims && lake build)
          (cd crates/lean-rs-host/shims/lean-rs-interop-shims && lake build)
          (cd crates/lean-rs-host/shims/lean-rs-host-shims && lake build)
          (cd fixtures/lean && lake build)
          (cd fixtures/interop-shims && lake build)

      - name: Loader regression suite
        run: cargo +nightly test -p lean-rs-worker-child --test loader_regressions -- --nocapture --test-threads=1

      - name: ASan Rust-only helper tests
        env:
          RUSTFLAGS: "-Z sanitizer=address -Cdebug-assertions=on"
          RUSTDOCFLAGS: "-Z sanitizer=address"
        run: |
          cargo +nightly test -p lean-toolchain --target x86_64-unknown-linux-gnu \
            -- --test-threads=1

      - name: In-process Lean ASan compatibility note
        run: |
          echo "::notice::In-process Lean runtime tests are not ASan-instrumented in CI. Lean's shared runtime is uninstrumented and currently crashes Linux ASan before producing actionable Rust diagnostics. Loader regressions, normal workspace tests, worker containment tests, and release/manual ABI fuzzing remain the gates for those paths."

  fuzz:
    name: ABI fuzz smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          key: sanitizer-fuzz-${{ env.LEAN_VERSION_HEAD }}

      - name: Install elan + Lean ${{ env.LEAN_VERSION_HEAD }}
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain leanprover/lean4:v${{ env.LEAN_VERSION_HEAD }}
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Export LEAN_SYSROOT
        run: |
          echo "LEAN_SYSROOT=$HOME/.elan/toolchains/leanprover--lean4---v${{ env.LEAN_VERSION_HEAD }}" >> "$GITHUB_ENV"

      - name: Build Lake packages
        run: |
          (cd crates/lean-rs/shims/lean-rs-interop-shims && lake build)
          (cd fixtures/lean && lake build)

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run ABI fuzz smoke
        working-directory: crates/lean-rs/fuzz
        # See release.yml for the rationale behind disabling LSan via
        # `ASAN_OPTIONS=detect_leaks=0`: LSan flags Lean's intentional
        # runtime non-cleanup as leaks at process exit, which is
        # orthogonal to the ABI-decode coverage this gate is for.
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: cargo +nightly fuzz run abi_decode -- -runs=200000 -max_total_time=120
