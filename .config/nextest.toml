# Memory-aware test execution config for the lean-rs workspace.
#
# Per-process Lean state is heavy: each test that opens a `LeanHost` and
# imports `LeanRsFixture.Handles` (which transitively imports the full
# Lean compiler environment) commits several hundred MB of resident
# memory. Process parallelism is capped against memory, not CPU count,
# so the suite stays well under typical CI runner RAM (~7 GiB on
# `ubuntu-latest` / `macos-latest`).
#
# See `docs/testing.md` for the full rationale and for the local
# developer workflow.

[profile.default]
# Cap parallel test processes. 4 × ~1 GiB per process ≈ 4 GiB working
# set worst-case — comfortably fits inside CI runner memory. Override
# locally with `NEXTEST_TEST_THREADS=N cargo nextest run ...`.
test-threads = 4

# We want full visibility into all failures in a single run rather than
# stopping at the first.
fail-fast = false

# Lean import paths legitimately take seconds on a cold process; warn
# instead of terminating, and only kill after four consecutive periods
# without progress (~4 minutes).
slow-timeout = { period = "60s", terminate-after = 4 }

# Env vars (LEAN_RS_NUM_THREADS=1, RUST_LOG=warn) are set in
# `.cargo/config.toml` under `[env]` so they apply uniformly to every
# cargo invocation (cargo test, cargo nextest, cargo run --example).
# nextest's own env-var keys differ between versions; the cargo
# `[env]` table is the stable single source of truth.

[profile.ci]
# CI inherits all default thresholds and adds a single automatic retry
# so transient flakes from CI runner noise (network blips during
# capability dylib open, etc.) don't break the build.
retries = 1
fail-fast = false
