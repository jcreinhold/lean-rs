# Workspace-level cargo config. Sets env vars that should apply to
# every cargo invocation: `cargo test`, `cargo nextest run`,
# `cargo run --example`, etc.
#
# See `docs/testing.md` for the rationale behind each variable.

[build]
# Keep cargo itself from multiplying rustc/link jobs while Lean-linked tests
# are also spawning child worker processes.
jobs = 1

[env]
# Pin the Lean task manager to a single worker thread per process.
# Combined with the `test-threads = 1` cap in `.config/nextest.toml`
# this bounds total Lean worker threads at 1 across the whole test
# run. `LeanRuntime::init` reads this once at first init; later
# changes are ignored. Override locally (e.g. for a benchmark run
# that legitimately wants Lean parallelism) with `LEAN_RS_NUM_THREADS=8
# cargo bench ...`; `[env]` defaults are overridden by the process
# environment unless they are marked `force = true`.
LEAN_RS_NUM_THREADS = "1"

# Make plain `cargo test` serialize libtest cases too. This does not make
# broad same-process host suites safe, but it avoids multiplying heavy tests
# inside one harness by default.
RUST_TEST_THREADS = "1"

# Default local memory guardrails for worker children and profiling examples.
# These are fail-fast caps, not reclamation; process exit is still the reset.
LEAN_RS_LEAN_MAX_MEMORY_KIB = "1572864"
LEAN_RS_LONG_SESSION_IMPORTS = "1"
LEAN_RS_LONG_SESSION_MAX_RSS_KIB = "1572864"
LEAN_RS_WORKER_MEMORY_MAX_IMPORTS = "1"
LEAN_RS_WORKER_MEMORY_MAX_RSS_KIB = "1572864"
LEAN_RS_POOL_MEMORY_MAX_WORKERS = "1"
LEAN_RS_POOL_MEMORY_TOTAL_RSS_KIB = "1572864"
LEAN_RS_POOL_MEMORY_PER_WORKER_RSS_KIB = "1572864"
LEAN_RS_POOL_MEMORY_MAX_IMPORTS = "1"

# Quieter `tracing` output by default; override per-invocation with
# `RUST_LOG=lean_rs=debug cargo ...`.
RUST_LOG = "warn"
